<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="openModalBtn">Open Modal</button>
    <button id="openAlertBtn">Open Alert</button>
    
    <!-- Modal chính -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModalBtn">Close</span>
            <p>This is a modal window!</p>
        </div>
    </div>
    
    <!-- Modal phụ để xác nhận -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <p>Bạn có chắc chắn muốn đóng?</p>
            <button id="confirmOkBtn">OK</button>
            <button id="confirmNoBtn">No</button>
        </div>
    </div>
    
    <script type="module" src="./test1.js"></script>
    <script type="module" src="./test2.js"></script>
    <script type="module" src="./valtest.js"></script>
</body>
</html>
